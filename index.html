    <script>
      // Tracking Events
      document.addEventListener('DOMContentLoaded', function() {
        // Sitelink Tracking
        document.body.addEventListener('click', function(e) {
          const link = e.target.closest('a');
          if (!link) return;
          const href = link.getAttribute('href');
          if (!href) return;
          
          if (href.includes('/estoque')) {
            window.gtag && window.gtag('event', 'sitelink_click', { 'sitelink_name': 'Ver Estoque', 'page_path': window.location.pathname });
          } else if (href.includes('/vender-meu-carro')) {
            window.gtag && window.gtag('event', 'sitelink_click', { 'sitelink_name': 'Vender Meu Carro', 'page_path': window.location.pathname });
          } else if (href.includes('/financiamento')) {
            window.gtag && window.gtag('event', 'sitelink_click', { 'sitelink_name': 'Financiamento', 'page_path': window.location.pathname });
          }
        });
        
        // Form Submit Tracking
        document.body.addEventListener('submit', function(e) {
          const form = e.target;
          window.gtag && window.gtag('event', 'form_submit', {
            'form_name': form.id || 'formulario_site',
            'page_path': window.location.pathname
          });
        });
        
        // Helper global method backward compatibility
        window.getWhatsappLink = function() {
          const phone = "5534999484285";
          const message = "Olá, gostaria de saber mais informações";
          return `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        };

        // Button CTA Tracking
        document.body.addEventListener('click', function(e) {
          const btn = e.target.closest('.btn-cta');
          if (btn) {
            window.gtag && window.gtag('event', 'cta_click', {
              'cta_name': btn.innerText.trim(),
              'page_path': window.location.pathname
            });
          }
        });
      });
    </script>
